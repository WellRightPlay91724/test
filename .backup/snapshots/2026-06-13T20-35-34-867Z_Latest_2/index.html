<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hello world</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.03em;
      text-shadow: 0 0 80px rgba(247, 151, 30, 0.3);
      animation: fadeIn 1s ease-out;
      cursor: default;
    }

    .secret-e {
      display: inline-block;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .secret-e:hover {
      transform: scale(1.3);
      text-shadow: 0 0 40px rgba(255, 200, 0, 0.8);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    #gameCanvas {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
    }

    .game-over {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    .game-over.show {
      display: flex;
    }

    .game-over h2 {
      font-size: 3rem;
      color: #ff4444;
      text-shadow: 0 0 30px rgba(255,0,0,0.5);
      margin-bottom: 1rem;
    }

    .game-over p {
      font-size: 1.2rem;
      color: #aaa;
      margin-bottom: 2rem;
    }

    .game-over button {
      background: #f7971e;
      color: #111;
      border: none;
      padding: 12px 40px;
      font-size: 1.2rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .game-over button:hover {
      transform: scale(1.1);
      background: #ffd200;
    }
  </style>
</head>
<body>
  <h1 id="title">
    h<span class="secret-e" id="secretTrigger">e</span>llo world
  </h1>

  <canvas id="gameCanvas"></canvas>

  <div class="game-over" id="gameOver">
    <h2>GAME OVER</h2>
    <p>Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">PLAY AGAIN</button>
  </div>

  <script>
    const trigger = document.getElementById('secretTrigger');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const title = document.getElementById('title');
    const gameOver = document.getElementById('gameOver');
    const finalScore = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');

    const PIXEL = 4;
    const COLS = 40;
    const ROWS = 30;

    let gameRunning = false;
    let animationId = null;
    let score = 0;

    const player = { x: 5, y: 15, w: 2, h: 3 };
    const particles = [];
    const obstacles = [];
    const trail = [];
    const shake = { x: 0, y: 0, intensity: 0 };
    const keys = {};

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);

    function startGame() {
      title.style.display = 'none';
      canvas.style.display = 'block';
      gameOver.classList.remove('show');
      resize();

      player.x = 5;
      player.y = 15;
      score = 0;
      obstacles.length = 0;
      particles.length = 0;
      trail.length = 0;
      shake.intensity = 0;
      shake.x = 0;
      shake.y = 0;

      gameRunning = true;
      if (animationId) cancelAnimationFrame(animationId);
      loop();
    }

    function gameLoop() {
      if (!gameRunning) return;

      if (keys['ArrowUp'] && player.y > 0) player.y--;
      if (keys['ArrowDown'] && player.y + player.h < ROWS) player.y++;
      if (keys['ArrowLeft'] && player.x > 0) player.x--;
      if (keys['ArrowRight'] && player.x + player.w < COLS) player.x++;

      if (Math.random() < 0.08) {
        obstacles.push({
          x: COLS - 1,
          y: Math.floor(Math.random() * (ROWS - 2)),
          w: 2,
          h: 2,
          speed: 0.3 + Math.random() * 0.4
        });
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.x -= o.speed;

        if (o.x + o.w < 0) {
          obstacles.splice(i, 1);
          score++;
          continue;
        }

        if (
          player.x < o.x + o.w &&
          player.x + player.w > o.x &&
          player.y < o.y + o.h &&
          player.y + player.h > o.y
        ) {
          shake.intensity = 12;
          for (let k = 0; k < 20; k++) {
            particles.push({
              x: player.x + player.w / 2,
              y: player.y + player.h / 2,
              vx: (Math.random() - 0.5) * 3,
              vy: (Math.random() - 0.5) * 3,
              life: 1,
              color: ['#f7971e','#ffd200','#ff4444','#fff'][Math.floor(Math.random()*4)]
            });
          }
          gameRunning = false;
          finalScore.textContent = score;
          gameOver.classList.add('show');
          return;
        }
      }

      trail.unshift({ x: player.x, y: player.y, life: 1 });
      if (trail.length > 15) trail.pop();

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      }

      if (shake.intensity > 0) {
        shake.x = (Math.random() - 0.5) * shake.intensity;
        shake.y = (Math.random() - 0.5) * shake.intensity;
        shake.intensity *= 0.9;
        if (shake.intensity < 0.3) { shake.intensity = 0; shake.x = 0; shake.y = 0; }
      }

      draw();
      animationId = requestAnimationFrame(gameLoop);
    }

    function draw() {
      ctx.save();
      ctx.translate(shake.x, shake.y);

      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cellW = canvas.width / COLS;
      const cellH = canvas.height / ROWS;

      ctx.imageSmoothingEnabled = false;

      for (let t of trail) {
        ctx.globalAlpha = t.life * 0.15;
        ctx.fillStyle = '#f7971e';
        ctx.fillRect(t.x * cellW, t.y * cellH, cellW * player.w, cellH * player.h);
        t.life -= 0.07;
      }
      ctx.globalAlpha = 1;

      for (let o of obstacles) {
        ctx.fillStyle = '#ff3366';
        ctx.shadowColor = '#ff3366';
        ctx.shadowBlur = 10;
        ctx.fillRect(o.x * cellW, o.y * cellH, cellW * o.w, cellH * o.h);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ff6699';
        ctx.fillRect(o.x * cellW + 2, o.y * cellH + 2, cellW * o.w - 4, cellH * o.h - 4);
      }

      ctx.shadowColor = '#f7971e';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#f7971e';
      ctx.fillRect(player.x * cellW, player.y * cellH, cellW * player.w, cellH * player.h);

      ctx.fillStyle = '#ffd200';
      ctx.fillRect(player.x * cellW + 2, player.y * cellH + 2, cellW * player.w - 4, cellH * player.h - 4);
      ctx.shadowBlur = 0;

      for (let p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        const s = cellW * 0.6;
        ctx.fillRect(p.x * cellW - s/2, p.y * cellH - s/2, s, s);
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = `${Math.floor(cellH * 0.5)}px monospace`;
      ctx.fillText(`SCORE: ${score}`, cellW, cellH * 1.5);

      ctx.restore();
    }

    function loop() {
      if (!gameRunning) {
        draw();
        return;
      }
      gameLoop();
    }

    trigger.addEventListener('click', () => {
      startGame();
    });

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (e.key.startsWith('Arrow')) e.preventDefault();
    });

    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    restartBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
