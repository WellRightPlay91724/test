<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Fichas de Cálculo Mental 1-10</title>
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }
 body {
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 background: #e8ecf1;
 padding: 30px 20px;
 display: flex;
 flex-direction: column;
 align-items: center;
 }
 .container {
 max-width: 1100px;
 width: 100%;
 background: white;
 border-radius: 20px;
 padding: 35px 30px;
 box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
 }
 h1 {
 color: #2c3e50;
 font-size: 2.2rem;
 text-align: center;
 font-weight: 700;
 letter-spacing: -0.5px;
 }
 h1 span {
 color: #3498db;
 }
 .subtitle {
 text-align: center;
 color: #7f8c8d;
 font-size: 1.1rem;
 margin-top: 5px;
 margin-bottom: 25px;
 border-bottom: 3px solid #3498db;
 padding-bottom: 15px;
 }
 .controls {
 display: flex;
 justify-content: center;
 gap: 15px;
 flex-wrap: wrap;
 margin-bottom: 30px;
 }
 .btn {
 background: #3498db;
 color: white;
 border: none;
 padding: 12px 30px;
 border-radius: 30px;
 font-size: 1rem;
 font-weight: 600;
 cursor: pointer;
 transition: 0.3s;
 box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
 }
 .btn:hover {
 background: #2980b9;
 transform: translateY(-2px);
 box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
 }
 .btn-success {
 background: #27ae60;
 box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
 }
  .btn-success:hover {
  background: #229954;
  box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
  }
  .btn-answers {
  background: #e67e22;
  box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);
  }
  .btn-answers:hover {
  background: #d35400;
  box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4);
  }
  .btn-answers.active {
  background: #27ae60;
  box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
  }
  .soluciones {
  margin-top: 35px;
  padding-top: 20px;
  border-top: 3px solid #ecf0f1;
  }
  .soluciones h3 {
  color: #2c3e50;
  font-size: 1.3rem;
  margin-bottom: 12px;
  text-align: center;
  }
  .tabla-sol {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  }
  .tabla-sol .item {
  background: #f1f9f1;
  border: 1px solid #c8e6c9;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 1rem;
  font-weight: 600;
  color: #2e7d32;
  text-align: center;
  }
 .grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
 gap: 20px;
 margin-top: 10px;
 }
 .ficha {
 background: #f8f9fa;
 border-radius: 16px;
 padding: 18px 20px;
 border: 2px solid #e9ecef;
 transition: 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
 box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
 }
 .ficha:hover {
 border-color: #3498db;
 box-shadow: 0 4px 16px rgba(52, 152, 219, 0.12);
 }
  .operacion {
  font-size: 1.8rem;
  font-weight: 700;
  color: #2c3e50;
  display: flex;
  align-items: center;
  gap: 6px;
  }
  .operacion .simbolo {
  color: #3498db;
  min-width: 30px;
  text-align: center;
  }
  .operacion .igual {
  color: #95a5a6;
  }
  .operacion .interrogacion {
  color: #e74c3c;
  font-weight: 900;
  }
   .campo-respuesta {
   width: 46px;
   height: 36px;
  text-align: center;
  font-size: 1.2rem;
  font-weight: 700;
  border: 2px solid #ccc;
  border-radius: 8px;
  outline: none;
  transition: 0.2s;
  color: #000;
  background: #fff;
  }
   .campo-respuesta:focus {
   border-color: #3498db;
   box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
   }
   .campo-respuesta:read-only {
   border-color: #a5d6a7;
   background: #e8f5e9;
   cursor: default;
   }
   .footer {
  margin-top: 30px;
  }
 /* Modo impresión */
 @media print {
 body {
 background: white;
 padding: 15px;
 }
 .container {
 box-shadow: none;
 padding: 20px;
 }
 .controls {
 display: none !important;
 }
 .ficha {
 border: 1.5px solid #ccc;
 break-inside: avoid;
 page-break-inside: avoid;
 }
 .grid {
 gap: 14px;
 }
  .btn {
  display: none;
  }
  .soluciones {
  display: none !important;
  }
  .btn-answers {
  display: none !important;
  }

 }
 @media (max-width: 600px) {
 .container {
 padding: 20px 15px;
 }
 h1 {
 font-size: 1.6rem;
 }
 .operacion {
 font-size: 1.4rem;
 }
  .grid {
  grid-template-columns: 1fr;
  }
 }
 </style>
</head>
<body>
 <div class="container" id="contenedor">
 <h1> Fichas de <span>Cálculo Mental</span></h1>
 <div class="subtitle">Suma · Resta · Multiplicación · División &nbsp;|&nbsp; Números
del 1 al 50</div>
  <div class="controls">
  <button class="btn" onclick="generarFichas()"> Mezclar fichas</button>
  <button class="btn btn-success" onclick="imprimirPDF()"> Descargar
 PDF</button>
  <button class="btn btn-answers" id="btnRespuestas" onclick="toggleRespuestas()"> Mostrar respuestas</button>
  </div>
  <div class="grid" id="gridFichas"></div>
  <div class="soluciones" id="soluciones">
  <h3> Soluciones</h3>
  <div id="tablaSoluciones"></div>
  </div>

 </div>
 <script>
 // ========== DATOS ==========
  const operaciones = [];
 // Generar 20 operaciones variadas
 function generarOperaciones() {
 const ops = [];
 const tipos = ['+', '-', '×', '÷'];

  // Sumas (1-50)
  for (let i = 0; i < 5; i++) {
  let a = Math.floor(Math.random() * 49) + 1;
  let b = Math.floor(Math.random() * (50 - a)) + 1;
  ops.push({ op: '+', a, b, res: a + b });
  }
  // Restas (1-50)
  for (let i = 0; i < 5; i++) {
  let a = Math.floor(Math.random() * 49) + 2;
  let b = Math.floor(Math.random() * (a - 1)) + 1;
  ops.push({ op: '-', a, b, res: a - b });
  }
  // Multiplicaciones (1-50)
  for (let i = 0; i < 4; i++) {
  let a = Math.floor(Math.random() * 50) + 1;
  let b = Math.floor(Math.random() * 50) + 1;
  if (a * b <= 50) {
  ops.push({ op: '×', a, b, res: a * b });
  } else {
  i--;
  }
  }
  // Divisiones (1-50)
  for (let i = 0; i < 4; i++) {
  let b = Math.floor(Math.random() * 50) + 1;
  let res = Math.floor(Math.random() * 50) + 1;
  let a = b * res;
  if (a <= 50 && b !== 0) {
  ops.push({ op: '÷', a, b, res });
  } else {
  i--;
  }
  }
 return ops;
 }
 // Mezclar array
 function mezclarArray(arr) {
 for (let i = arr.length - 1; i > 0; i--) {
 const j = Math.floor(Math.random() * (i + 1));
 [arr[i], arr[j]] = [arr[j], arr[i]];
 }
 return arr;
 }
   let operacionesActuales = [];
   let respuestasVisibles = false;
   // Renderizar fichas
   function renderizarFichas(ops) {
   const grid = document.getElementById('gridFichas');
   grid.innerHTML = '';
   ops.forEach((op, index) => {
   const ficha = document.createElement('div');
   ficha.className = 'ficha';
   const operacionDiv = document.createElement('div');
   operacionDiv.className = 'operacion';
   op.inputId = 'res-' + index;
   operacionDiv.innerHTML = `
   <span>${op.a}</span>
   <span class="simbolo">${op.op}</span>
   <span>${op.b}</span>
   <span class="igual">=</span>
   <span class="interrogacion"><input class="campo-respuesta" id="${op.inputId}"></span>
   `;
   ficha.appendChild(operacionDiv);
   grid.appendChild(ficha);
   });
  actualizarSoluciones(ops);
  }
  function actualizarSoluciones(ops) {
  const container = document.getElementById('tablaSoluciones');
  container.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'tabla-sol';
  ops.forEach(op => {
  const item = document.createElement('span');
  item.className = 'item';
  item.textContent = `${op.a} ${op.op} ${op.b} = ${op.res}`;
  div.appendChild(item);
  });
  container.appendChild(div);
  }
  // Generar nuevas fichas
  function generarFichas() {
  respuestasVisibles = false;
  document.getElementById('btnRespuestas').textContent = ' Mostrar respuestas';
  document.getElementById('btnRespuestas').classList.remove('active');
  const ops = generarOperaciones();
  const mezcladas = mezclarArray(ops);
  operacionesActuales = mezcladas;
  renderizarFichas(mezcladas);
  }
  function toggleRespuestas() {
  respuestasVisibles = !respuestasVisibles;
  const btn = document.getElementById('btnRespuestas');
  operacionesActuales.forEach(op => {
  const input = document.getElementById(op.inputId);
  if (input) {
  input.value = respuestasVisibles ? op.res : '';
  input.readOnly = respuestasVisibles;
  }
  });
  if (respuestasVisibles) {
  btn.textContent = ' Ocultar respuestas';
  btn.classList.add('active');
  } else {
  btn.textContent = ' Mostrar respuestas';
  btn.classList.remove('active');
  }
  }
  // Imprimir / PDF
  function imprimirPDF() {
  window.print();
  }
  // Inicializar
  generarFichas();
 </script>
</body>
</html>
