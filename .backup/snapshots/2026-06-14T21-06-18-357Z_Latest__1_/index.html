<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluppy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
body { overflow: hidden; background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
canvas { display: block; image-rendering: pixelated; cursor: pointer; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}
#title {
  color: #fff; font-size: clamp(2.5rem,8vw,5rem); font-weight: 900;
  text-shadow: 0 4px 0 #000, 0 6px 20px rgba(0,0,0,0.5);
  letter-spacing: -0.03em; margin-bottom: 0.5rem;
}
#title span { color: #f7d44a; }
#sub {
  color: rgba(255,255,255,0.6); font-size: clamp(0.8rem,2vw,1.1rem);
  margin-bottom: 2rem; letter-spacing: 0.2em;
}
#hint {
  color: rgba(255,255,255,0.9); font-size: clamp(1rem,2.5vw,1.3rem);
  animation: pulse 1.2s ease-in-out infinite;
  background: rgba(0,0,0,0.4); padding: 10px 24px; border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.1);
  pointer-events: auto; cursor: pointer; transition: all 0.2s;
}
#hint:hover { background: rgba(0,0,0,0.6); border-color: #f7d44a; }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.05); opacity: 1; }
}
#scoreDisplay {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: clamp(2.5rem,6vw,4rem); font-weight: 900;
  text-shadow: 0 3px 0 #000, 0 5px 15px rgba(0,0,0,0.5);
  z-index: 5; display: none; letter-spacing: -0.03em;
}
#highScore {
  position: fixed; top: 20px; right: 20px;
  color: rgba(255,255,255,0.25); font-size: clamp(0.7rem,1.5vw,0.9rem);
  z-index: 5; display: none; font-family: monospace;
}
#sheetBackdrop {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 15; display: none;
  pointer-events: auto;
}
#gameOverSheet {
  position: fixed; bottom: 0; left: 0; width: 100%; max-height: 80vh;
  z-index: 20; background: #1c1c2e; border-radius: 24px 24px 0 0;
  transform: translateY(100%); transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
  pointer-events: auto; display: flex; flex-direction: column;
  border-top: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 -10px 60px rgba(0,0,0,0.6);
}
#gameOverSheet.show { transform: translateY(0); }
#sheetHandle {
  width: 40px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15);
  margin: 12px auto 8px; flex-shrink: 0;
}
#sheetContent {
  padding: 8px 28px 32px; overflow-y: auto; flex: 1;
  display: flex; flex-direction: column; align-items: center;
}
#sheetScore { color: #f7d44a; font-size: 3.2rem; font-weight: 900; margin: 4px 0 2px; letter-spacing: -0.03em; font-family: monospace; }
#sheetScoreLabel { color: rgba(255,255,255,0.2); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; }
#sheetBest {
  color: rgba(255,255,255,0.25); font-size: 0.85rem; margin-bottom: 24px;
  border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; width: 100%; text-align: center;
}
#reviveBtn {
  background: linear-gradient(135deg,#6a5acd,#8b7add); color: #fff; border: none;
  padding: 14px 36px; font-size: 1rem; font-family: monospace; font-weight: bold;
  cursor: pointer; pointer-events: auto; border-radius: 14px;
  transition: all 0.2s; width: 100%; max-width: 280px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
#reviveBtn:not(.disabled):hover { transform: scale(1.05); filter: brightness(1.15); }
#reviveBtn.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(0.8); }
#reviveBtn .cost { color: #f7d44a; font-weight: 900; }
#restartSheetBtn {
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.08);
  padding: 12px 36px; font-size: 0.9rem; font-family: monospace; font-weight: bold;
  cursor: pointer; pointer-events: auto; border-radius: 14px;
  transition: all 0.2s; width: 100%; max-width: 280px;
}
#restartSheetBtn:hover { background: rgba(255,255,255,0.1); color: #fff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="title">Fl<span id="titleAccent">u</span>ppy</div>
  <div id="sub">Pixel Bird</div>
  <div id="hint">TAP / CLICK / SPACE</div>
</div>
<div id="scoreDisplay">0</div>
<div id="highScore">BEST: 0</div>
<div id="sheetBackdrop"></div>
<div id="gameOverSheet">
  <div id="sheetHandle"></div>
  <div id="sheetContent">
    <div id="sheetScore">0</div>
    <div id="sheetScoreLabel">score</div>
    <div id="sheetBest">BEST: <span id="sheetBestScore">0</span></div>
    <button id="reviveBtn"><span>✨ Revive</span> <span class="cost">(5 pts)</span></button>
    <button id="restartSheetBtn">↻ Restart</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const title = document.getElementById('title');
const titleAccent = document.getElementById('titleAccent');
const sub = document.getElementById('sub');
const hint = document.getElementById('hint');
const overlay = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const highScoreEl = document.getElementById('highScore');
const sheetBackdrop = document.getElementById('sheetBackdrop');
const gameOverSheet = document.getElementById('gameOverSheet');
const sheetScore = document.getElementById('sheetScore');
const sheetBestScore = document.getElementById('sheetBestScore');
const sheetBest = document.getElementById('sheetBest');
const reviveBtn = document.getElementById('reviveBtn');
const restartSheetBtn = document.getElementById('restartSheetBtn');

let W, H, scale;
function resize() {
  W = Math.min(window.innerWidth, 540);
  H = Math.min(window.innerHeight, 800);
  scale = Math.floor(Math.min(W / 540, H / 800) * 4) / 4 || 1;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);

const GRAVITY = 0.45;
const JUMP = -6.2;
const PIPE_W = 40;
const PIPE_GAP = 110;
const PIPE_SPEED = 2.2;
const GROUND_H = 60;
const BIRD_R = 12;

let state = 'title';
let bird, pipes, score, best, groundX, frame, shake, shakeTimer, gameTimer;
let isNight, cycleTime, enemies, enemyTimer;
let revivePts, breakingPipe, breakTimer, breakShake;

function init() {
  bird = { x: W * 0.3, y: H * 0.4, vy: 0, r: BIRD_R, rot: 0, wing: 0 };
  pipes = [];
  score = 0;
  groundX = 0;
  frame = 0;
  shake = 0;
  shakeTimer = 0;
  gameTimer = 0;
  cycleTime = 0;
  isNight = false;
  enemies = [];
  enemyTimer = 0;
  revivePts = 0;
  breakingPipe = null;
  breakTimer = 0;
  breakShake = 0;
  best = parseInt(localStorage.getItem('fluppyBest') || '0');
  highScoreEl.textContent = 'BEST: ' + best;
}

function addPipe() {
  const minY = 60;
  const maxY = H - GROUND_H - PIPE_GAP - 60;
  const gapY = minY + Math.random() * (maxY - minY);
  pipes.push({ x: W + 20, gapY, scored: false });
}

function flap() {
  if (state === 'title') {
    startGame();
    return;
  }
  if (state === 'playing') {
    bird.vy = JUMP;
    playFlap();
  }
}

function startGame() {
  state = 'playing';
  init();
  overlay.style.display = 'none';
  scoreDisplay.style.display = 'block';
  highScoreEl.style.display = 'block';
  sheetBackdrop.style.display = 'none';
  gameOverSheet.classList.remove('show');
  addPipe();
}

function showSheet() {
  sheetScore.textContent = score;
  sheetBestScore.textContent = best;
  sheetBest.style.display = 'block';
  sheetBackdrop.style.display = 'block';
  reviveBtn.classList.remove('disabled');
  reviveBtn.innerHTML = '<span>✨ Revive</span>';
  requestAnimationFrame(() => { gameOverSheet.classList.add('show'); });
}

function doRevive() {
  sheetBackdrop.style.display = 'none';
  gameOverSheet.classList.remove('show');

  shake = 0;
  shakeTimer = 0;
  bird.x = W * 0.3;
  bird.y = H * 0.4;
  bird.vy = 0;
  bird.rot = 0;

  let nearest = null, nd = Infinity;
  for (const p of pipes) {
    const d = Math.abs(p.x + PIPE_W / 2 - bird.x);
    if (d < nd) { nd = d; nearest = p; }
  }
  if (nearest) {
    breakingPipe = nearest;
    breakTimer = 0.8;
    breakShake = 8;
    nearest.breaking = true;
  }
  state = 'reviving';
  playTone(440, 0.15, 0.06);
}

function gameOver() {
  state = 'dead';
  shake = 4;
  shakeTimer = 5;
  playCrash();
  if (score > best) {
    best = score;
    localStorage.setItem('fluppyBest', best.toString());
  }
  setTimeout(showSheet, 500);
}

function update() {
  if (shakeTimer > 0) {
    shakeTimer -= 1/60;
    shake = 4;
  } else {
    shake = 0;
  }

  if (state === 'reviving') {
    if (breakShake > 0) {
      breakShake *= 0.92;
      if (breakShake < 0.1) breakShake = 0;
    }
    breakTimer -= 1/60;
    shake = breakShake;
    if (breakTimer <= 0 && breakingPipe) {
      const idx = pipes.indexOf(breakingPipe);
      if (idx !== -1) pipes.splice(idx, 1);
      breakingPipe = null;
      shake = 0;
      state = 'playing';
      playFlap();
    }
    return;
  }

  if (state !== 'playing') return;
  frame++;
  gameTimer++;

  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rot = Math.max(-0.5, Math.min(1.5, bird.vy * 0.08));

  bird.wing = Math.sin(frame * 0.2) * 0.3 + 0.7;
  if (bird.vy > 0) bird.wing = Math.max(0.1, bird.wing - 0.02);

  if (bird.y > H - GROUND_H - bird.r) {
    bird.y = H - GROUND_H - bird.r;
    gameOver();
    return;
  }
  if (bird.y < bird.r) {
    bird.y = bird.r;
    bird.vy = 0;
  }

  groundX = (groundX - PIPE_SPEED) % 24;

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      revivePts++;
      scoreDisplay.textContent = score;
      playScore();
    }

    if (p.x + PIPE_W < -20) {
      pipes.splice(i, 1);
      continue;
    }

    if (checkCollision(p)) {
      gameOver();
      return;
    }
  }

  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - 220 + Math.random() * 80) {
    if (gameTimer > 60) addPipe();
  }

  cycleTime += 1/60;
  isNight = (cycleTime % 50) > 30;

  if (isNight) {
    enemyTimer -= 1/60;
    if (enemyTimer <= 0) {
      enemyTimer = 1 + Math.random() * 2;
      const ey = 40 + Math.random() * (H - GROUND_H - 80);
      enemies.push({ x: W + 10, y: ey, r: 10, vx: -2 - Math.random() * 1.5, vy: (Math.random() - 0.5) * 0.5 });
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.x += e.vx;
      e.y += e.vy;
      e.vy += (bird.y - e.y) * 0.001;
      if (e.x < -20) { enemies.splice(i, 1); continue; }
      const dx = bird.x - e.x, dy = bird.y - e.y;
      if (dx * dx + dy * dy < (bird.r + e.r) * (bird.r + e.r)) {
        gameOver();
        return;
      }
    }
  } else {
    enemies = [];
  }
}

function checkCollision(p) {
  const bx = bird.x, by = bird.y, br = bird.r;
  const px = p.x, py = p.gapY, pw = PIPE_W, pg = PIPE_GAP;

  if (bx + br > px && bx - br < px + pw) {
    if (by - br < py || by + br > py + pg) return true;
  }
  return false;
}

function draw() {
  ctx.save();

  if (shake > 0.5) {
    ctx.translate((Math.random()-0.5)*shake*2, (Math.random()-0.5)*shake*2);
  }

  if (isNight) {
    const ng = ctx.createLinearGradient(0, 0, 0, H);
    ng.addColorStop(0, '#0a0a2e'); ng.addColorStop(0.5, '#1a1a4e'); ng.addColorStop(1, '#2a2a3e');
    ctx.fillStyle = ng; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 50; i++) {
      ctx.fillStyle = `rgba(255,255,255,${0.1 + Math.random() * 0.4})`;
      ctx.beginPath(); ctx.arc(Math.random() * W, Math.random() * (H - GROUND_H), 0.3 + Math.random(), 0, Math.PI * 2); ctx.fill();
    }
  } else {
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#4dc9f6'); gradient.addColorStop(0.6, '#87ceeb'); gradient.addColorStop(1, '#b8e6b8');
    ctx.fillStyle = gradient; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 30; i++) {
      const sx = (i * 137.5 + 50) % W, sy = (i * 97.3 + 20) % (H - GROUND_H);
      ctx.fillStyle = `rgba(255,255,255,${0.2 + (i % 5) * 0.05})`;
      ctx.beginPath(); ctx.arc(sx, sy, 0.5 + (i % 3) * 0.3, 0, Math.PI * 2); ctx.fill();
    }
  }

  for (const p of pipes) {
    const x = p.x, topH = p.gapY, bottomY = p.gapY + PIPE_GAP;
    if (p.breaking) {
      const offset = (1 - breakTimer / 0.8) * 30;
      ctx.shadowColor = '#ffaa44'; ctx.shadowBlur = 20;
      for (let frag = 0; frag < 6; frag++) {
        const fx = x + frag * 7 + Math.sin(breakTimer * 20 + frag) * offset * 0.5;
        const fw = 5 + Math.random() * 3;
        const fh = (topH / 6) + Math.random() * 8;
        ctx.fillStyle = frag % 2 === 0 ? '#6aaf4a' : '#5a8f3c';
        ctx.fillRect(fx, frag * (topH / 6) + Math.sin(breakTimer * 15 + frag) * 4, fw, fh);
      }
      for (let frag = 0; frag < 6; frag++) {
        const fx = x + frag * 7 + Math.cos(breakTimer * 18 + frag) * offset * 0.5;
        const fw = 5 + Math.random() * 3;
        const fh = ((H - GROUND_H - bottomY) / 6) + Math.random() * 8;
        ctx.fillStyle = frag % 2 === 0 ? '#6aaf4a' : '#5a8f3c';
        ctx.fillRect(fx, bottomY + frag * ((H - GROUND_H - bottomY) / 6) + Math.cos(breakTimer * 12 + frag) * 4, fw, fh);
      }
      ctx.shadowBlur = 0;
      continue;
    }
    ctx.shadowColor = '#ffaa44'; ctx.shadowBlur = isNight ? 20 : 0;
    ctx.fillStyle = '#6aaf4a'; ctx.fillRect(x, 0, PIPE_W, topH);
    ctx.fillRect(x, bottomY, PIPE_W, H - GROUND_H - bottomY);
    ctx.fillStyle = '#5a8f3c'; ctx.fillRect(x, topH - 16, PIPE_W, 16);
    ctx.fillRect(x, bottomY, PIPE_W, 16);
    ctx.shadowBlur = 0;
  }

  for (const e of enemies) {
    ctx.fillStyle = '#cc3333';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#881111';
    ctx.beginPath(); ctx.arc(e.x - 2, e.y - 1, e.r * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff6666';
    ctx.beginPath(); ctx.arc(e.x + 3, e.y - 3, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(e.x + 4, e.y - 3, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath(); ctx.moveTo(e.x + e.r + 1, e.y - 2); ctx.lineTo(e.x + e.r + 6, e.y); ctx.lineTo(e.x + e.r + 1, e.y + 2); ctx.fill();
  }

  const gy = H - GROUND_H;
  ctx.fillStyle = '#8b6b3d';
  ctx.fillRect(0, gy, W, GROUND_H);
  ctx.fillStyle = '#7a5b2d';
  for (let gx = groundX; gx < W; gx += 24) {
    ctx.fillRect(gx, gy + 4, 12, 4);
    ctx.fillRect(gx + 12, gy + 12, 12, 4);
  }
  ctx.fillStyle = '#6a4b1d';
  ctx.fillRect(0, gy, W, 3);

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);

  const bw = bird.r * 2.2;
  const bh = bird.r * 1.6;

  ctx.fillStyle = '#f7d44a';
  ctx.beginPath();
  ctx.ellipse(0, 0, bw / 2, bh / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e8b828';
  ctx.beginPath();
  ctx.ellipse(-2, 2, bw / 2.5, bh / 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(4, -3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(6, -3, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(7, -4, 0.8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#f7971e';
  ctx.beginPath();
  ctx.moveTo(bw / 2 + 2, -2);
  ctx.lineTo(bw / 2 + 10, 0);
  ctx.lineTo(bw / 2 + 2, 2);
  ctx.fill();

  ctx.fillStyle = '#e04040';
  ctx.beginPath();
  ctx.moveTo(-3, 4);
  ctx.lineTo(-8, 8);
  ctx.lineTo(-1, 7);
  ctx.fill();

  ctx.fillStyle = '#e8b828';
  ctx.beginPath();
  ctx.arc(-4, -6, 2, 0, Math.PI * 2);
  ctx.fill();

  if (bird.vy < 2) {
    const wingY = -bh / 2 + 2 + (1 - bird.wing) * 8;
    ctx.fillStyle = '#d4a020';
    ctx.beginPath();
    ctx.ellipse(-6, wingY, 10, 4, -0.3 + (1 - bird.wing) * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c49018';
    ctx.beginPath();
    ctx.ellipse(-6, wingY + 1, 8, 2, -0.3 + (1 - bird.wing) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  ctx.restore();

  if (state === 'playing') {
    const remaining = isNight ? Math.ceil(50 - (cycleTime % 50)) : Math.ceil(30 - (cycleTime % 50));
    ctx.fillStyle = isNight ? 'rgba(255,200,100,0.4)' : 'rgba(255,255,200,0.3)';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'left';
    ctx.fillText((isNight ? '🌙' : '☀️') + ' ' + remaining + 's', 12, 22);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// --- Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(f, d, v, t) {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t || 'sine';
    o.frequency.setValueAtTime(f, audioCtx.currentTime);
    g.gain.setValueAtTime(v || 0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
  } catch(e) {}
}
function playFlap() { playTone(520, 0.08, 0.06); playTone(680, 0.06, 0.04); }
function playScore() { playTone(880, 0.1, 0.06); setTimeout(() => playTone(1100, 0.1, 0.04), 60); }
function playCrash() { playTone(200, 0.3, 0.08, 'sawtooth'); setTimeout(() => playTone(120, 0.4, 0.06, 'sawtooth'), 200); }

// --- Input ---
canvas.addEventListener('click', (e) => { audioCtx.resume(); flap(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); audioCtx.resume(); flap(); });
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); audioCtx.resume(); flap(); }
});
reviveBtn.addEventListener('click', () => { audioCtx.resume(); doRevive(); });
restartSheetBtn.addEventListener('click', () => { audioCtx.resume(); startGame(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') { audioCtx.resume(); if (state === 'dead' || state === 'reviving') doRevive(); }
});

init();
loop();
</script>
</body>
</html>
